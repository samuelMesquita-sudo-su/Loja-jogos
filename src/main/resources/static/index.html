<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js"></script>
    <title>Loja</title>
</head>
<body>
  <!--listar todos os jogos -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <a class="navbar-brand" href="./index.html">
        <img src="controller.svg" width="42" height="42">
        Loja
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link active" href="./index.html">Home</a>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
              Funções
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#" onclick="cadastrar()">Cadastrar</a></li>
            </ul>
          </li>
        </ul>

        <form class="d-flex">
          <input class="form-control me-2" type="search" placeholder="Search">
          <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
      </div>
    </nav>
  </header>

  <main>
    <form id="form">
      <div class="mb-3">
        <label for="nome" class="form-label">Nome do Jogo</label>
        <input type="text" class="form-control" id="nome">
      </div>
      <div class="mb-3">
        <label for="categoria" class="form-label">Categoria do Jogo</label>
        <input type="text" class="form-control" id="categoria">
      </div>
      <div class="mb-3">
        <label for="preco" class="form-label">Preço do Jogo</label>
        <input type="number" class="form-control" id="preco">
      </div>
      <div class="mb-3">
        <label for="codigo_ativacao" class="form-label">Código de Ativação do Jogo</label>
        <input type="text" class="form-control" id="codigo_ativacao">
      </div>
      <button type="button" class="btn btn-success" onclick="salvar()">Salvar</button>
    </form>

    <br>



    <div id="lista" class="row">
        <!-- os cards aparecem na função listar do js -->
    </div>


    <!-- Modal -->
    <div class="modal fade" id="alterarModal" tabindex="-1" aria-labelledby="alterarModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="alterarModalLabel">Alteração</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body">
            <form id="formAlterar">
              <input type="hidden" id="alterarId">
              <div class="mb-3">
                <label for="alterarNome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="alterarNome">
              </div>
              <div class="mb-3">
                <label for="alterarCategoria" class="form-label">Categoria</label>
                <input type="text" class="form-control" id="alterarCategoria">
              </div>
              <div class="mb-3">
                <label for="alterarPreco" class="form-label">Preço</label>
                <input type="number" step="0.01" class="form-control" id="alterarPreco">
              </div>
              <div class="mb-3">
                <label for="alterarCodigo" class="form-label">Código de Ativação</label>
                <input type="text" class="form-control" id="alterarCodigo">
              </div>
            </form>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button onclick="salvarAlteracao()" type="button" class="btn btn-primary">Salvar Alterações</button>
          </div>

        </div>
      </div>
    </div>

  </main>


  <footer class="bg-dark text-light mt-5">
    <div class="bg-secondary text-center py-2">
      <small>&copy; 2026 Loja - Todos os direitos reservados</small>
    </div>
  </footer>

</body>
</html>
